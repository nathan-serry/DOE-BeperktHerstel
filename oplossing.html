<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oplossing - DOE</title>

  <style>
    :root {
      --bg: #e9e3d6;
      --paper: #f4efe4;
      --ink: #16120c;
      --muted: #746c62;
      --line: #cbc1b2;
      --accent: #b85b28;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: monospace;
      padding: 16px;
    }

    .shell {
      width: min(800px, 100%);
      margin: 0 auto;
      border: 1px solid var(--line);
      background: var(--paper);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      border-bottom: 1px solid var(--line);
    }

    .content {
      padding: 30px;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 2rem;
    }

    textarea {
      width: 100%;
      height: 200px;
      padding: 12px;
      font-size: 1rem;
      border: 1px solid var(--line);
      resize: vertical;
      font-family: monospace;
    }

    .footer {
      padding: 15px;
      border-top: 1px solid var(--line);
      font-size: 0.7rem;
      text-align: center;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <div class="shell">

    <header class="topbar">
      <span>DOE</span>
      <a href="index.html">Terug</a>
    </header>

    <main class="content">
      <h1>Typ hier je tekst</h1>

      <textarea placeholder="Schrijf hier..."></textarea>
    </main>

    <footer class="footer">
      DUURZAAMHEID · ONDERNEMENSCHAP · ETHIEK
    </footer>

  </div>
</body>
</html>
